name = "bilisops-chat"
main = "worker/index.js"
compatibility_date = "2024-11-01"
compatibility_flags = ["nodejs_compat"]

# Serve the built React app (dist/) as static assets. Requests to /api/* run the
# Worker first; any other path is served from dist/ with SPA fallback to index.html.
[assets]
directory = "./dist"
binding = "ASSETS"
not_found_handling = "single-page-application"
run_worker_first = ["/api/*"]

# Secrets/vars are NOT set here. Configure them in:
#   • Worker → Settings → Variables & Secrets (production)
#   • .dev.vars (local `wrangler dev`)
# Required:  SUPABASE_URL, SUPABASE_SERVICE_KEY
# Optional:  ANTHROPIC_API_KEY, SHOPEE_*, LAZADA_*, TIKTOK_*, META_*
